version: '3.8'

services:
  payload:
    image: ${GHCR_IMAGE:-chi-portfolio:latest}
    container_name: chi-portfolio
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - portfolio_network

  mongo:
    image: mongo:latest
    container_name: chi-portfolio-db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: chi_portfolio
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge

volumes:
  mongo_data:
