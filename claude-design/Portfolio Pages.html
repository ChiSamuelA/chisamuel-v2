<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Portfolio Pages — Chi Samuel Apeng</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@200;300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="lib/design-canvas.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="pages/page-home.jsx"></script>
<script type="text/babel" src="pages/page-case-study.jsx"></script>
<script type="text/babel" src="pages/page-cv.jsx"></script>
<script type="text/babel" src="pages/page-contact.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas>
    <DCSection id="pages" title="Portfolio — Cinematic direction, all pages" subtitle="Home · Case study · CV · Contact. Click any artboard to open it fullscreen. Widths are 1440 (desktop).">
      <DCArtboard id="home" label="01 · Home — extended" width={1440} height={4400}>
        <PageHome />
      </DCArtboard>
      <DCArtboard id="case" label="02 · Case study (BarriereHilfe — template)" width={1440} height={5200}>
        <PageCaseStudy />
      </DCArtboard>
      <DCArtboard id="cv" label="03 · CV — full resume page" width={1440} height={3400}>
        <PageCV />
      </DCArtboard>
      <DCArtboard id="contact" label="04 · Contact — portrait lives here" width={1440} height={2800}>
        <PageContact />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
